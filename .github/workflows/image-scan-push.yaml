name: Image Scan and Push

on:
  push:
    branches: [main]
    paths:
      - 'helm/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/shrinidhi972004/boutique

jobs:
  scan-and-push:
    name: Scan and push ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    strategy:
      matrix:
        include:
          - service: frontend
            upstream: gcr.io/google-samples/microservices-demo/frontend:v0.10.1
          - service: cartservice
            upstream: gcr.io/google-samples/microservices-demo/cartservice:v0.10.1
          - service: productcatalogservice
            upstream: gcr.io/google-samples/microservices-demo/productcatalogservice:v0.10.1
          - service: currencyservice
            upstream: gcr.io/google-samples/microservices-demo/currencyservice:v0.10.1
          - service: paymentservice
            upstream: gcr.io/google-samples/microservices-demo/paymentservice:v0.10.1
          - service: shippingservice
            upstream: gcr.io/google-samples/microservices-demo/shippingservice:v0.10.1
          - service: emailservice
            upstream: gcr.io/google-samples/microservices-demo/emailservice:v0.10.1
          - service: recommendationservice
            upstream: gcr.io/google-samples/microservices-demo/recommendationservice:v0.10.1
          - service: adservice
            upstream: gcr.io/google-samples/microservices-demo/adservice:v0.10.1
          - service: checkoutservice
            upstream: gcr.io/google-samples/microservices-demo/checkoutservice:v0.10.1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull upstream image
        run: docker pull ${{ matrix.upstream }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.upstream }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH
          output: trivy-${{ matrix.service }}.txt

      - name: Upload Trivy scan results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.service }}
          path: trivy-${{ matrix.service }}.txt

      - name: Tag and push to GHCR
        run: |
          docker tag ${{ matrix.upstream }} \
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          docker tag ${{ matrix.upstream }} \
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          docker push ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          docker push ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest

      - name: Print image digest
        run: |
          docker inspect \
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest \
            --format='{{index .RepoDigests 0}}'