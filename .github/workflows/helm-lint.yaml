name: Helm Lint

on:
  push:
    branches: [main]
    paths:
      - 'helm/**'
  pull_request:
    branches: [main]
    paths:
      - 'helm/**'

jobs:
  helm-lint:
    name: Lint Helm chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Lint Helm chart
        run: helm lint ./helm

      - name: Helm template dry run
        run: |
          helm template boutique ./helm \
            --namespace boutique \
            --debug 2>&1 | grep -v "^#" | head -50

      - name: Validate all templates render
        run: |
          helm template boutique ./helm \
            --namespace boutique | \
            grep "^kind:" | sort | uniq -c | sort -rn
