      cpuUtilization: 70
    pdb:
      enabled: true
      minAvailable: 1

redis:
  enabled: true
  image: redis
  tag: alpine
  port: 6379
  resources:
    requests:
      cpu: 70m
      memory: 200Mi
    limits:
      cpu: 125m
      memory: 256Mi
