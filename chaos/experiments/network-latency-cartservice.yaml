apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: cart-network-latency
  namespace: boutique
spec:
  appinfo:
    appns: boutique
    applabel: app=cartservice
    appkind: deployment
  chaosServiceAccount: litmus-admin
  experiments:
    - name: pod-network-latency
      spec:
        components:
          env:
            - name: TOTAL_CHAOS_DURATION
              value: "60"
            - name: NETWORK_LATENCY
              value: "2000"
            - name: JITTER
              value: "100"
            - name: CONTAINER_RUNTIME
              value: containerd
            - name: SOCKET_PATH
              value: /run/containerd/containerd.sock
        probe:
          - name: cart-latency-check
            type: httpProbe
            httpProbe/inputs:
              url: http://frontend.boutique.svc.cluster.local:8080/cart
              insecureSkipVerify: false
              method:
                get:
                  criteria: ==
                  responseCode: "200"
            mode: Continuous
            runProperties:
              probeTimeout: 10
              interval: 5
              retry: 3