# -------------------------------------------------------
# Prometheus
# -------------------------------------------------------
prometheus:
  prometheusSpec:
    retention: 15d
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    # Scrape all PodMonitors and ServiceMonitors across namespaces
    podMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false

# -------------------------------------------------------
# Grafana
# -------------------------------------------------------
grafana:
  enabled: true
  adminPassword: "boutique-grafana-admin"   # change in prod via secret
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  # Load custom dashboards from ConfigMaps
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: monitoring
  # Persist Grafana data
  persistence:
    enabled: true
    size: 5Gi

# -------------------------------------------------------
# Alertmanager
# -------------------------------------------------------
alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

# -------------------------------------------------------
# Node exporter + kube-state-metrics
# -------------------------------------------------------
nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true

# -------------------------------------------------------
# Default scrape configs
# -------------------------------------------------------
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: false        # not exposed on managed EKS
    configReloaders: true
    general: true
    k8s: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverHistogram: true
    kubeApiserverSlos: true
    kubelet: true
    kubeProxy: false   # not exposed on EKS
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesApps: true
    kubernetesResources: true
    kubernetesStorage: true
    kubernetesSystem: true
    kubeSchedulerAlerting: false  # not exposed on EKS
    kubeSchedulerRecording: false
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true